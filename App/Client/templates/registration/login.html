
{% partialdef form %}
    <c-form id="form" hx-post="{% url 'auth_login' %}?next={{ next|urlencode }}">
        {% csrf_token %}

        <c-form.field>
            <c-form.label for='email'>Email</c-form.label>
            <c-input id='email' name="email" type='email' placeholder='example@mail.com' value="{{ email }}" required></c-input>
            {% if invalid_email_error %}
                <c-form.error>This email is not registered</c-form.error>
            {% endif %}
        </c-form.field>
        
        <c-form.field>
            <c-form.label for='password'>Password</c-form.label>
            <c-input id='password' name="password" type='password' placeholder='*********' required></c-input>
            {% if invalid_password_error and not invalid_email_error %}
                <c-form.error>Invalid password</c-form.error>
            {% endif %}
        </c-form.field>

        <c-button type='submit' variant='accent' class="w-full">Sign in</c-button>
    </c-form>
{% endpartialdef %}

<c-layout.base>
    <div class="h-screen grid items-center p-4">
        <c-card>
            <c-card.header>
                <c-card.title>Welcome!</c-card.title>
            </c-card.header>
            <c-card.content>
                {% partial form %}
            </c-card.content>
        </c-card>
    </div>
</c-layout.base>
