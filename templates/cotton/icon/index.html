<c-vars icon="satellite" size="default" />

<div class="
    {% if size == 'default' %}text-xl
    {% elif size == 'lg' %}text-3xl
    {% elif size == 'sm' %}text-lg
    {% endif %}
    {% if class %}{{ class }}{% endif %}
    "
    {{ attrs }}>
    <span class="lucide icon-{{ icon }}"></span>
</div>
